{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>global clicker</title>

    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="" />

    <script src="{% static 'script.js' %}" defer></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

    <style>
        #map {
            height: 450px;
            width: 40%;
            border-radius: 15px;
            border-width: 3px;
            border-style: solid;
            border-color: #D1D5DB;
        }
        .leaflet-control-attribution {
            border-top: none !important;
            box-shadow: none !important;
        }
        .leaflet-container {
            background: #262626;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1 id="title">global clicker</h1>
        <p id="clicks">total clicks: {{ clicks }}</p>
        <button id="clicker" onclick="handleClick(event)">click me!</button>
        <form action="{% url 'click' %}" id="clickForm">
            <button type="submit" style="display: none;"></button>
        </form>
        <div id="map"></div>
        <footer id="footer">
            <p>made by swarit narang <br> <span style="font-size: 10px;">map data © OpenStreetMap contributors © CARTO</span></p>
        </footer>
    </div>
    <!-- the true hell -->
    <script>
        const lat = 80.0000;
        const lng = -74.0000;

        const zoom = 1;

        const map = L.map('map', { 
            zoomControl: false,
            scrollWheelZoom: false,
            doubleCLickZoom: false,
            boxZoom: false,
            touchZoom: false,
            dragging: false,
            keyboard: false,
            tapHold: false
        }).setView([30, 0], zoom);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: ''
        }).addTo(map);

        const marker = L.circleMarker([lat, lng], {
            radius: 2,
            fillColor: "#10B981",
            color: "#10B981",
            weight: 1,
            opacity: 1,
            fillOpacity: 0.8
        }).addTo(map);
    </script>
</body>
</html>
